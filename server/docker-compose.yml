# Notify monitoring stack — vLLM/LiteLLM container monitoring + GPU + host CPU/mem.
# Managed by the web admin (service: admin, http://<host>:8088).
# Retention / log-rotation knobs come from .env (generated by the admin).
#
# IMPORTANT: MONITOR_DIR must equal the *host* absolute path of this directory
# (e.g. /opt/monitor) so the admin container can run `docker compose` and the
# daemon resolves the ./config bind mounts correctly. The admin writes it to .env.

# Cap each container's stdout/stderr log on disk (json-file rotation).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "${LOG_MAX_SIZE:-10m}"
    max-file: "${LOG_MAX_FILE:-3}"

services:
  admin:
    build: ./admin
    container_name: monitor-admin
    environment:
      # In-container path where the app reads/writes config (fixed; see relative bind below).
      - MONITOR_DIR=/srv/monitor
      # Host absolute path of this dir. Passed to `docker compose --project-directory`
      # so the daemon resolves the ./config bind mounts against the real host path.
      - HOST_MONITOR_DIR=${MONITOR_DIR:-/opt/monitor}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Relative bind = this directory on the host, on Linux AND Docker Desktop (Windows/macOS).
      - ./:/srv/monitor
    ports:
      - "${ADMIN_PORT:-8088}:8088"          # Web admin UI
    restart: unless-stopped
    networks: [monitor]
    logging: *default-logging

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROM_RETENTION_TIME:-15d}'
      - '--storage.tsdb.retention.size=${PROM_RETENTION_SIZE:-0}'
      - '--web.enable-lifecycle'      # POST /-/reload for hot config reload
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    networks: [monitor]
    logging: *default-logging

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"          # Notify desktop app polls this
    restart: unless-stopped
    networks: [monitor]
    logging: *default-logging

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    restart: unless-stopped
    networks: [monitor]
    logging: *default-logging

  dcgm-exporter:
    image: nvidia/dcgm-exporter:latest
    container_name: dcgm-exporter
    runtime: nvidia
    cap_add:
      - SYS_ADMIN            # required for NVLink/Tensor profiling metrics
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./config/dcgm-counters.csv:/etc/dcgm-exporter/custom-counters.csv
    command: ["-f", "/etc/dcgm-exporter/custom-counters.csv"]
    ports:
      - "${DCGM_PORT:-9400}:9400"
    restart: unless-stopped
    networks: [monitor]
    logging: *default-logging

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    command:
      - '--path.rootfs=/host'
    pid: host
    volumes:
      # 注: 一部環境(Docker Desktop 等)では `/` が shared/slave マウントでないため
      #     `rslave` 伝播指定だと `path / ... is not a shared or slave mount` で失敗する。
      #     基本の CPU/メモリ/ディスク収集には伝播指定は不要なので付けない。
      - /:/host:ro
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"          # host CPU / memory / disk metrics
    restart: unless-stopped
    networks: [monitor]
    logging: *default-logging

  loki:
    image: grafana/loki:latest
    container_name: loki
    # The loki image runs as uid 10001; a root-owned named volume blocks mkdir
    # under /tmp/loki. Run as root so it can create chunk/compactor dirs.
    user: root
    volumes:
      - ./config/loki-config.yml:/etc/loki/local-config.yaml
      - ./config/loki-rules:/etc/loki/rules
      - loki-data:/tmp/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks: [monitor]
    logging: *default-logging

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ./config/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks: [monitor]
    logging: *default-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "${CADVISOR_PORT:-8080}:8080"
    restart: unless-stopped
    networks: [monitor]
    logging: *default-logging

volumes:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  monitor:
    name: monitor
