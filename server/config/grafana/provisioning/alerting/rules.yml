- orgId: 1
  name: heartbeat_rules
  folder: Notify Alerts
  interval: 1m
  rules:
  - uid: notify-8c9b5cb743784434ab88
    title: AlwaysFiringTest
    condition: C
    for: 10s
    data:
    - refId: A
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: prometheus
      model:
        refId: A
        editorMode: code
        expr: (vector(1)) * 0 + 1
        instant: true
        range: false
        intervalMs: 1000
        maxDataPoints: 43200
        legendFormat: __auto
    - refId: C
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: __expr__
      model:
        refId: C
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
        intervalMs: 1000
        maxDataPoints: 43200
    noDataState: OK
    execErrState: Error
    labels:
      severity: warning
    annotations:
      summary: Notify 接続テスト用アラート
      description: 常時発火。Notify アプリの接続確認に使用します。
