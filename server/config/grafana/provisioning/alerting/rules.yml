- orgId: 1
  name: gpu_health
  folder: Notify Alerts
  interval: 1m
  rules:
  - uid: notify-5f6f4dc3d85063d6f631
    title: GPUMemoryHigh
    condition: C
    for: 5m
    data:
    - refId: A
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: prometheus
      model:
        refId: A
        editorMode: code
        expr: ((DCGM_FI_DEV_FB_USED / DCGM_FI_DEV_FB_TOTAL) * 100 > 95) * 0 + 1
        instant: true
        range: false
        intervalMs: 1000
        maxDataPoints: 43200
        legendFormat: __auto
    - refId: C
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: __expr__
      model:
        refId: C
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
        intervalMs: 1000
        maxDataPoints: 43200
    noDataState: OK
    execErrState: Error
    labels:
      severity: warning
    annotations:
      summary: GPU{{ $labels.gpu }} の VRAM 使用率が高い (%)
      description: FB 使用率が閾値超で5分継続。OOM/断片化のリスク。vLLM の gpu_cache_usage_perc も併せて確認してください。
  - uid: notify-f391e4706cbf2c4940ec
    title: GPUNVLinkSaturated
    condition: C
    for: 5m
    data:
    - refId: A
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: prometheus
      model:
        refId: A
        editorMode: code
        expr: ((DCGM_FI_PROF_NVLINK_TX_BYTES + DCGM_FI_PROF_NVLINK_RX_BYTES) > 20e9) * 0 + 1
        instant: true
        range: false
        intervalMs: 1000
        maxDataPoints: 43200
        legendFormat: __auto
    - refId: C
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: __expr__
      model:
        refId: C
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
        intervalMs: 1000
        maxDataPoints: 43200
    noDataState: OK
    execErrState: Error
    labels:
      severity: warning
    annotations:
      summary: GPU{{ $labels.gpu }} の NVLink 帯域が飽和気味
      description: NVLink TX+RX が閾値超で5分継続。テンソル並列の通信ボトルネックの可能性。閾値は GPU のリンク帯域に合わせて調整してください。
  - uid: notify-5a01bcf7dd698c8cdc2b
    title: GPUThermalThrottling
    condition: C
    for: 1m
    data:
    - refId: A
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: prometheus
      model:
        refId: A
        editorMode: code
        expr: (rate(DCGM_FI_DEV_THERMAL_VIOLATION[5m]) > 0) * 0 + 1
        instant: true
        range: false
        intervalMs: 1000
        maxDataPoints: 43200
        legendFormat: __auto
    - refId: C
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: __expr__
      model:
        refId: C
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
        intervalMs: 1000
        maxDataPoints: 43200
    noDataState: OK
    execErrState: Error
    labels:
      severity: critical
    annotations:
      summary: GPU{{ $labels.gpu }} がサーマルスロットリング中
      description: 温度制約による周波数低下が継続的に発生しています。冷却/設置/電力設定を確認してください。
  - uid: notify-4c8e68744eb68ce609d5
    title: GPUTemperatureHigh
    condition: C
    for: 2m
    data:
    - refId: A
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: prometheus
      model:
        refId: A
        editorMode: code
        expr: (DCGM_FI_DEV_GPU_TEMP > 85) * 0 + 1
        instant: true
        range: false
        intervalMs: 1000
        maxDataPoints: 43200
        legendFormat: __auto
    - refId: C
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: __expr__
      model:
        refId: C
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
        intervalMs: 1000
        maxDataPoints: 43200
    noDataState: OK
    execErrState: Error
    labels:
      severity: warning
    annotations:
      summary: GPU{{ $labels.gpu }} の温度が高い (C)
      description: 閾値超が2分継続。サーマルスロットリングに至る前の予兆です。
  - uid: notify-9c9746c77d55e0a73811
    title: GPULowEfficiency
    condition: C
    for: 15m
    data:
    - refId: A
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: prometheus
      model:
        refId: A
        editorMode: code
        expr: |-
          ((avg_over_time(DCGM_FI_PROF_GR_ENGINE_ACTIVE[15m]) < 0.2)
          and
          (avg_over_time(DCGM_FI_DEV_POWER_USAGE[15m]) > 100)) * 0 + 1
        instant: true
        range: false
        intervalMs: 1000
        maxDataPoints: 43200
        legendFormat: __auto
    - refId: C
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: __expr__
      model:
        refId: C
        type: threshold
        expression: A
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
        intervalMs: 1000
        maxDataPoints: 43200
    noDataState: OK
    execErrState: Error
    labels:
      severity: warning
    annotations:
      summary: GPU{{ $labels.gpu }} の利用効率が低い
      description: 電力消費は高い一方で計算エンジン稼働率が15分平均で閾値未満。確保したまま遊んでいる/通信待ち等で効率が悪い可能性。Grafana で SM・Tensor 稼働率の内訳を確認してください。
