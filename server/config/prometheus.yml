# AUTO-GENERATED by the Notify monitoring web admin.
# Edit via the web UI (http://<host>:8088), not by hand.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
scrape_configs:
- job_name: prometheus
  static_configs:
  - targets:
    - localhost:9090
- job_name: cadvisor
  static_configs:
  - targets:
    - cadvisor:8080
- job_name: node
  static_configs:
  - targets:
    - node-exporter:9100
- job_name: dcgm
  static_configs:
  - targets:
    - dcgm-exporter:9400
- job_name: vllm
  metrics_path: /metrics
  static_configs:
  - targets:
    - vllm:8000
- job_name: litellm
  metrics_path: /metrics
  static_configs:
  - targets:
    - litellm:4000
