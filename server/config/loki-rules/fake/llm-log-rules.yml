# AUTO-GENERATED by the Notify monitoring web admin.
groups:
- name: llm_log_rules
  rules:
  - alert: VllmErrorLog
    expr: |-
      sum by (container) (
        count_over_time({container="vllm"} |~ `(?i)error|exception|cuda|out of memory` [5m])
      ) > 0
    for: 0m
    labels:
      severity: warning
    annotations:
      summary: vllm コンテナでエラーログを検知しました
      description: 直近5分でエラー/例外等のログ行を 0 件超検知しました。
  - alert: LitellmErrorLog
    expr: |-
      sum by (container) (
        count_over_time({container="litellm"} |~ `(?i)error|exception` [5m])
      ) > 0
    for: 0m
    labels:
      severity: warning
    annotations:
      summary: litellm コンテナでエラーログを検知しました
      description: 直近5分でエラー/例外等のログ行を 0 件超検知しました。
